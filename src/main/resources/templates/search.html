<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Googol — Distributed Search Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0a0a0f;
            --surface:   #111118;
            --border:    #1e1e2e;
            --accent:    #6c63ff;
            --accent2:   #ff6584;
            --accent3:   #43e97b;
            --text:      #e8e8f0;
            --muted:     #6b6b80;
            --radius:    14px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Ambient background blobs */
        body::before {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(108,99,255,.12) 0%, transparent 70%);
            top: -200px; left: -200px;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,101,132,.08) 0%, transparent 70%);
            bottom: -150px; right: -150px;
            pointer-events: none;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
            width: 100%;
            max-width: 680px;
            position: relative;
            z-index: 1;
            animation: fadeUp .6s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3.5rem, 10vw, 6rem);
            font-weight: 800;
            letter-spacing: -.04em;
            line-height: 1;
            background: linear-gradient(135deg, #6c63ff 0%, #ff6584 50%, #43e97b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            user-select: none;
        }

        .tagline {
            font-size: .9rem;
            font-weight: 300;
            color: var(--muted);
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-top: -.5rem;
        }

        /* Search bar */
        .search-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: .75rem;
        }

        .search-row {
            display: flex;
            gap: .5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: .4rem .4rem .4rem 1.4rem;
            transition: border-color .2s, box-shadow .2s;
        }

        .search-row:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108,99,255,.15);
        }

        .search-row input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 1.05rem;
            font-weight: 400;
        }

        .search-row input::placeholder { color: var(--muted); }

        .search-row button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: .65rem 1.4rem;
            border-radius: 999px;
            font-family: 'DM Sans', sans-serif;
            font-size: .9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background .2s, transform .1s;
            white-space: nowrap;
        }

        .search-row button:hover  { background: #7c74ff; }
        .search-row button:active { transform: scale(.97); }

        /* Nav links */
        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: .88rem;
            letter-spacing: .02em;
            padding: .35rem .8rem;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: color .2s, border-color .2s;
        }

        .nav-links a:hover {
            color: var(--text);
            border-color: var(--border);
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 1.5rem;
            font-size: .78rem;
            color: var(--muted);
            letter-spacing: .04em;
        }
    </style>
</head>
<body>

<div class="hero">
    <div>
        <div class="logo">Googol</div>
        <p class="tagline">Distributed Search Engine</p>
    </div>

    <form class="search-form" action="/search" method="get">
        <div class="search-row">
            <input type="text" name="query" placeholder="Search the indexed web…" autofocus autocomplete="off">
            <button type="submit">Search</button>
        </div>
    </form>

    <nav class="nav-links">
        <a href="/stats">Live Stats</a>
        <a href="/index">Index a URL</a>
    </nav>
</div>

<footer>Distributed Systems &mdash; University of Coimbra</footer>

</body>
</html>
