<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Googol - Motor de Pesquisa</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    body {
      background-color: #f9f9f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      background: linear-gradient(45deg, #4285F4, #34A853, #FBBC05, #EA4335);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
      letter-spacing: -1px;
    }

    form {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 2rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 16px 20px;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      font-size: 1rem;
      outline: none;
      box-shadow: 0 1px 6px rgba(32, 33, 36, 0.08);
      transition: all 0.2s ease;
    }

    input[type="text"]:hover {
      box-shadow: 0 1px 8px rgba(32, 33, 36, 0.15);
    }

    input[type="text"]:focus {
      box-shadow: 0 1px 10px rgba(32, 33, 36, 0.2);
    }

    button {
      background: #4285F4;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 24px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      align-self: center;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #357ae8;
    }

    .links {
      display: flex;
      gap: 20px;
      margin-top: 1rem;
    }

    .links a {
      color: #4285F4;
      text-decoration: none;
      font-size: 0.9rem;
      padding: 8px 16px;
      border-radius: 18px;
      transition: background 0.2s ease;
    }

    .links a:hover {
      background-color: #e8f0fe;
      text-decoration: underline;
    }

    .logo-dot {
      color: #EA4335;
      font-weight: bold;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 2.5rem;
      }

      form {
        max-width: 90%;
      }
    }
  </style>
</head>
<body>
<h1>Googo<span class="logo-dot">l</span></h1>
<form action="/search" method="get">
  <input type="text" name="word" placeholder="Pesquise qualquer coisa..." />
  <button type="submit">Pesquisar</button>
</form>
<div class="links">
  <a href="/stats">Ver estatísticas</a>
  <a href="/index">Indexar URL</a>
</div>
</body>
</html>
