<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Googol - Resultados da Pesquisa</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            padding: 20px;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Cabeçalho */
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e8e8e8;
        }

        .header h1 {
            font-size: 2rem;
            margin-right: 20px;
            background: linear-gradient(45deg, #4285F4, #34A853, #FBBC05, #EA4335);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .header form {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        .header input[type="text"] {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            font-size: 0.9rem;
            outline: none;
            box-shadow: 0 1px 6px rgba(32, 33, 36, 0.08);
        }

        .header button {
            background: #4285F4;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        /* Resultados de pesquisa */
        .search-results {
            margin-bottom: 30px;
        }

        .search-results ul {
            list-style-type: none;
        }

        .search-results li {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .search-results a {
            display: block;
            font-weight: 600;
            font-size: 1.1rem;
            color: #1a73e8;
            text-decoration: none;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .search-results a:hover {
            text-decoration: underline;
        }

        .search-results small {
            display: block;
            color: #5f6368;
            font-size: 0.9rem;
            line-height: 1.5;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            font-style: normal;
        }

        /* Paginação */
        .pagination-info {
            text-align: center;
            margin-bottom: 15px;
            color: #5f6368;
            font-size: 0.9rem;
        }

        .pagination {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .pagination ul {
            display: flex;
            list-style-type: none;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .pagination li {
            margin: 0;
        }

        .pagination a {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 4px;
            background-color: #f1f3f4;
            color: #1a73e8;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        .pagination a:hover {
            background-color: #e8f0fe;
            text-decoration: none;
        }

        .pagination a.active {
            background-color: #1a73e8;
            color: white;
        }

        .logo-dot {
            color: #EA4335;
            font-weight: bold;
        }

        @media (max-width: 640px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header form {
                width: 100%;
                margin-top: 15px;
            }

            .search-results a {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Googo<span class="logo-dot">l</span></h1>
    <form action="/search" method="get">
        <input type="text" name="word" placeholder="Pesquise qualquer coisa..." th:value="${word}" />
        <button type="submit">Pesquisar</button>
    </form>
</div>

<!-- Resultados de pesquisa -->
<div class="search-results">
    <ul>
        <li th:each="url : ${results}">
            <a th:href="${url}" th:text="${titles.get(url)}">Link</a>
            <small th:text="${snippets.get(url)}">Trecho do conteúdo da página que corresponde à pesquisa realizada pelo usuário, exibindo o contexto em que a palavra-chave aparece.</small>
        </li>
    </ul>
</div>

<!-- Informação de paginação -->
<div class="pagination-info">
    <span>Página <span th:text="${currentPage + 1}">1</span> de <span th:text="${totalPages}">5</span></span>
</div>

<!-- Navegação de paginação -->
<div class="pagination">
    <ul>
        <li th:if="${currentPage > 0}">
            <a th:href="@{/search(word=${word}, page=${currentPage - 1})}">Anterior</a>
        </li>
        <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/search(word=${word}, page=${i})}"
               th:text="${i + 1}"
               th:classappend="${i == currentPage} ? 'active' : ''">1</a>
        </li>
        <li th:if="${currentPage < totalPages - 1}">
            <a th:href="@{/search(word=${word}, page=${currentPage + 1})}">Próximo</a>
        </li>
    </ul>
</div>
</body>
</html>
