<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Googol — ' + ${query}">Googol — Search Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0a0a0f;
            --surface:  #111118;
            --surface2: #16161f;
            --border:   #1e1e2e;
            --accent:   #6c63ff;
            --accent2:  #ff6584;
            --accent3:  #43e97b;
            --text:     #e8e8f0;
            --muted:    #6b6b80;
            --radius:   12px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        /* ── Header ────────────────────────────────────────────── */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,10,15,.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            padding: .75rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -.04em;
            background: linear-gradient(135deg, #6c63ff, #ff6584, #43e97b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
            flex-shrink: 0;
        }

        .search-row {
            flex: 1;
            max-width: 600px;
            display: flex;
            gap: .4rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: .3rem .3rem .3rem 1.1rem;
            transition: border-color .2s, box-shadow .2s;
        }

        .search-row:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108,99,255,.15);
        }

        .search-row input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: .95rem;
        }

        .search-row input::placeholder { color: var(--muted); }

        .search-row button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: .5rem 1.1rem;
            border-radius: 999px;
            font-family: 'DM Sans', sans-serif;
            font-size: .85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background .2s;
        }

        .search-row button:hover { background: #7c74ff; }

        /* ── Main layout ───────────────────────────────────────── */
        main {
            max-width: 760px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        /* ── Meta bar ──────────────────────────────────────────── */
        .meta-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: .5rem;
            margin-bottom: 1.5rem;
            font-size: .82rem;
            color: var(--muted);
        }

        /* ── AI Analysis card ──────────────────────────────────── */
        .ai-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: var(--radius);
            padding: 1.1rem 1.4rem;
            margin-bottom: 1.75rem;
            animation: fadeUp .4s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .ai-card .ai-label {
            display: flex;
            align-items: center;
            gap: .45rem;
            font-size: .72rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--accent);
            margin-bottom: .6rem;
        }

        .ai-card .ai-label::before {
            content: '✦';
            font-size: .8rem;
        }

        .ai-card p {
            font-size: .92rem;
            line-height: 1.65;
            color: #b8b8cc;
            font-weight: 300;
        }

        /* ── HackerNews import ─────────────────────────────────── */
        .hn-bar {
            display: flex;
            align-items: center;
            gap: .75rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: .75rem 1.2rem;
            margin-bottom: 1.75rem;
            font-size: .85rem;
        }

        .hn-icon {
            width: 22px; height: 22px;
            background: #ff6600;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: .75rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .hn-bar span { flex: 1; color: var(--muted); }

        .hn-bar .hn-badge {
            background: #ff6600;
            color: #fff;
            border-radius: 4px;
            padding: .25rem .6rem;
            font-size: .75rem;
            font-weight: 500;
        }

        .hn-bar form { margin: 0; }

        .hn-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: .4rem .9rem;
            border-radius: 999px;
            font-family: 'DM Sans', sans-serif;
            font-size: .82rem;
            cursor: pointer;
            transition: border-color .2s, background .2s;
        }

        .hn-btn:hover { border-color: #ff6600; background: rgba(255,102,0,.08); }

        /* ── Result items ──────────────────────────────────────── */
        .results-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .result-item {
            padding: 1.2rem 0;
            border-bottom: 1px solid var(--border);
            animation: fadeUp .35s ease both;
        }

        .result-item:last-child { border-bottom: none; }

        .result-url {
            font-size: .75rem;
            color: var(--accent3);
            margin-bottom: .3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: .8;
        }

        .result-title {
            display: inline-block;
            font-size: 1.08rem;
            font-weight: 500;
            color: #9d9dff;
            text-decoration: none;
            line-height: 1.3;
            margin-bottom: .4rem;
            transition: color .15s;
        }

        .result-title:hover { color: var(--text); text-decoration: underline; }

        .result-snippet {
            font-size: .87rem;
            font-weight: 300;
            color: #8888a0;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .result-actions {
            margin-top: .55rem;
            display: flex;
            gap: .75rem;
        }

        .result-actions a {
            font-size: .75rem;
            color: var(--muted);
            text-decoration: none;
            padding: .2rem .6rem;
            border: 1px solid var(--border);
            border-radius: 999px;
            transition: color .15s, border-color .15s;
        }

        .result-actions a:hover {
            color: var(--text);
            border-color: var(--accent);
        }

        /* ── No results ────────────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
        }

        .empty-state h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: .75rem;
        }

        .empty-state p { color: var(--muted); font-size: .9rem; }

        /* ── Pagination ────────────────────────────────────────── */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .4rem;
            margin-top: 2.5rem;
            flex-wrap: wrap;
        }

        .pagination a, .pagination span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 2.1rem;
            height: 2.1rem;
            padding: 0 .6rem;
            border-radius: 8px;
            font-size: .85rem;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid var(--border);
            color: var(--muted);
            transition: color .15s, border-color .15s, background .15s;
        }

        .pagination a:hover {
            color: var(--text);
            border-color: var(--accent);
            background: rgba(108,99,255,.08);
        }

        .pagination .active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .pagination .ellipsis {
            border-color: transparent;
        }

        /* ── Imported badge ─────────────────────────────────────── */
        .import-notice {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            background: rgba(67,233,123,.1);
            border: 1px solid rgba(67,233,123,.3);
            color: var(--accent3);
            border-radius: 999px;
            padding: .3rem .8rem;
            font-size: .78rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<header>
    <a class="logo" href="/">Googol</a>
    <form class="search-row" action="/search" method="get">
        <input type="text" name="query" th:value="${query}" placeholder="Search…" autocomplete="off">
        <button type="submit">Search</button>
    </form>
</header>

<main>

    <!-- Meta bar -->
    <div class="meta-bar">
        <span th:if="${totalResults > 0}"
              th:text="${totalResults} + ' result' + (${totalResults} != 1 ? 's' : '') + ' for &quot;' + ${query} + '&quot;'">
        </span>
        <span th:if="${totalResults == 0}" th:text="'No results for &quot;' + ${query} + '&quot;'"></span>

        <span th:if="${param.hnImported != null}" class="import-notice">
            ✓ <span th:text="${param.hnImported} + ' HN URL' + (${param.hnImported} != '1' ? 's' : '') + ' queued for indexing'"></span>
        </span>
    </div>

    <!-- AI Analysis -->
    <div class="ai-card" th:if="${aiAnalysis != null and !#strings.isEmpty(aiAnalysis)}">
        <div class="ai-label">AI Overview</div>
        <p th:text="${aiAnalysis}"></p>
    </div>

    <!-- HackerNews import bar -->
    <div class="hn-bar" th:if="${totalResults > 0}">
        <div class="hn-icon">Y</div>
        <span>Index related Hacker News top stories for this query</span>
        <form action="/hackernews" method="post">
            <input type="hidden" name="query" th:value="${query}">
            <button type="submit" class="hn-btn">Import from HN</button>
        </form>
    </div>

    <!-- Results -->
    <ul class="results-list" th:if="${!results.isEmpty()}">
        <li class="result-item" th:each="r, stat : ${results}"
            th:style="'animation-delay: ' + (${stat.index} * 0.04) + 's'">
            <div class="result-url" th:text="${r['url']}"></div>
            <a class="result-title"
               th:href="${r['url']}"
               th:text="${r['title'] ?: r['url']}"
               target="_blank" rel="noopener noreferrer">
            </a>
            <p class="result-snippet" th:text="${r['snippet']}"></p>
            <div class="result-actions">
                <a th:href="@{/backlinks(url=${r['url']}, query=${query})}">Backlinks</a>
                <a th:href="${r['url']}" target="_blank" rel="noopener noreferrer">Visit ↗</a>
            </div>
        </li>
    </ul>

    <!-- Empty state -->
    <div class="empty-state" th:if="${results.isEmpty()}">
        <h2>No results found</h2>
        <p th:text="'Try different keywords or index more pages first.'"></p>
    </div>

    <!-- Pagination -->
    <nav class="pagination" th:if="${totalPages > 1}"
         aria-label="Search results pagination">

        <!-- Previous -->
        <a th:if="${currentPage > 0}"
           th:href="@{/search(query=${query}, page=${currentPage - 1})}">&larr;</a>

        <!-- Page numbers — show first, last and window around current -->
        <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <span th:if="${i != 0 and i != totalPages - 1 and (i < currentPage - 2 or i > currentPage + 2)
                           and i == currentPage - 3}"
                  class="ellipsis">&hellip;</span>

            <a th:if="${i == 0 or i == totalPages - 1
                        or (i >= currentPage - 2 and i <= currentPage + 2)}"
               th:href="@{/search(query=${query}, page=${i})}"
               th:text="${i + 1}"
               th:classappend="${i == currentPage} ? ' active' : ''">
            </a>

            <span th:if="${i != 0 and i != totalPages - 1 and (i < currentPage - 2 or i > currentPage + 2)
                           and i == currentPage + 3}"
                  class="ellipsis">&hellip;</span>
        </th:block>

        <!-- Next -->
        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/search(query=${query}, page=${currentPage + 1})}">&rarr;</a>
    </nav>

</main>
</body>
</html>
