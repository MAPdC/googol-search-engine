# ─────────────────────────────────────────────────────────────────────
#  Googol Search Engine — Application Configuration
#  All tuneable parameters live here; no recompilation required.
# ─────────────────────────────────────────────────────────────────────

spring.application.name=Googol

# Spring scheduling (required for StatsWebSocketService @Scheduled)
spring.task.scheduling.pool.size=2

# ── RMI Registry ─────────────────────────────────────────────────────
# Host and port where the RMI Registry is running.
# Change rmi.host to the IP of the machine running the Gateway when
# deploying across multiple machines.
rmi.host=localhost
rmi.port=1099

# ── Web Server ───────────────────────────────────────────────────────
server.port=8080

# ── HackerNews REST API ──────────────────────────────────────────────
hackernews.api.base-url=https://hacker-news.firebaseio.com/v0
# Maximum number of top stories to inspect when fetching HN URLs.
hackernews.max-stories=100

# ── AI Contextual Analysis (OpenAI-compatible REST API) ──────────────
# Set your API key here, or leave blank to disable the AI section.
# Compatible with OpenAI, Ollama (http://localhost:11434/v1), etc.
ai.api.url=https://api.groq.com/openai/v1/chat/completions
ai.api.key=${GROQ_API_KEY:}
ai.model=llama-3.1-8b-instant
ai.max-tokens=250

# ── Barrel Persistence ───────────────────────────────────────────────
# Directory where each Barrel persists its index snapshot to disk.
barrel.snapshot.dir=./barrel-snapshots
# How often (in seconds) a Barrel writes its state to disk.
barrel.snapshot.interval-seconds=60
